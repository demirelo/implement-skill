name: CI

# Runs the exact checks the README documents under "Testing":
#   python3 -m pytest -q
#   ruff check . && mypy skills/implement/scripts
# All offline — no network, no live models, no repo dependencies (only pytest/ruff/mypy tooling).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: python -m pip install --upgrade pip pytest ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy skills/implement/scripts

      - name: Test (pytest)
        run: python -m pytest -q
